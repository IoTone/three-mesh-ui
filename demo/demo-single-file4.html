<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>three-mesh-ui Demo - Login Panel + AR Button (Import Map)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-family: sans-serif;
            z-index: 100;
            pointer-events: none;
        }
    </style>

    <!-- ====================== IMPORT MAP ====================== -->
    <script type="importmap">
    {
      "imports": {
        "three": "http://localhost:8010/proxy/three@0.139.0/build/three.module.js",
        "three/": "http://localhost:8010/proxy/three@0.139.0/",
        "three-mesh-ui": "http://localhost:8010/proxy/three-mesh-ui@6.4.0/build/three-mesh-ui.module.js"
      }
    }
    </script>
</head>
<body>
<div id="info">three-mesh-ui + Import Map - Login Panel + AR Button</div>

<script type="module">
    import * as THREE from 'three';
    import ThreeMeshUI from 'three-mesh-ui';
    import { ARButton } from 'three/examples/jsm/webxr/ARButton.js';

    async function preloadFont() {
        const base = 'http://localhost:8010/proxy/three-mesh-ui@6.4.0/examples/assets/';

        try {
            const [json, texture] = await Promise.all([
                fetch(base + 'Roboto-msdf.json').then(r => r.json()),
                new Promise((resolve, reject) => {
                    const loader = new THREE.TextureLoader();
                    loader.load(base + 'Roboto-msdf.png', resolve, undefined, reject);
                })
            ]);

            ThreeMeshUI.FontLibrary.addFont('Roboto', json, texture);
            console.log('Roboto font preloaded successfully');
            return true;
        } catch (e) {
            console.error('Font load failed:', e);
            throw e;
        }
    }

    async function init() {
        await preloadFont();

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 2.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(devicePixelRatio);
        renderer.setSize(innerWidth, innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dir = new THREE.DirectionalLight(0xffffff, 0.8);
        dir.position.set(5, 10, 7);
        scene.add(dir);

        const model = new THREE.Mesh(
            new THREE.TorusKnotGeometry(0.5, 0.18, 120, 32),
            new THREE.MeshPhongMaterial({ color: 0x4488ff, shininess: 80 })
        );
        model.position.y = 1.4;
        scene.add(model);

        const panel = new ThreeMeshUI.Block({
            width: 1.1,
            height: 0.75,
            padding: 0.04,
            justifyContent: 'center',
            alignItems: 'center',
            backgroundColor: new THREE.Color(0x222233),
            fontFamily: 'Roboto',
            fontSize: 0.055,
        });
        panel.position.set(0, 1.6, -1.6);
        scene.add(panel);

        panel.add(new ThreeMeshUI.Text({ content: 'Login', fontSize: 0.08, fontColor: new THREE.Color(0x00ffdd) }));

        const row1 = new ThreeMeshUI.Block({ width: 0.95, height: 0.1, margin: 0.02, backgroundColor: new THREE.Color(0x444455) });
        row1.add(new ThreeMeshUI.Text({ content: 'Username: ' }));
        row1.add(new ThreeMeshUI.Text({ content: 'demo@example.com' }));
        panel.add(row1);

        const row2 = new ThreeMeshUI.Block({ width: 0.95, height: 0.1, margin: 0.02, backgroundColor: new THREE.Color(0x444455) });
        row2.add(new ThreeMeshUI.Text({ content: 'Password: ' }));
        row2.add(new ThreeMeshUI.Text({ content: '***********' }));
        panel.add(row2);

        const btn = new ThreeMeshUI.Block({
            width: 0.55,
            height: 0.14,
            margin: 0.04,
            justifyContent: 'center',
            backgroundColor: new THREE.Color(0x00cc77),
        });
        btn.add(new ThreeMeshUI.Text({ content: 'LOGIN', fontColor: new THREE.Color(0x000000) }));
        panel.add(btn);

        btn.onSelect = () => alert('Login clicked! (demo)');

        const arButton = ARButton.createButton(renderer, { optionalFeatures: ['local-floor'] });
        document.body.appendChild(arButton);

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        const clock = new THREE.Clock();
        renderer.setAnimationLoop(() => {
            model.rotation.y = clock.getElapsedTime() * 0.5;
            ThreeMeshUI.update();
            renderer.render(scene, camera);
        });

        console.log('Demo running - import map + font preloaded');
    }

    init().catch(err => {
        console.error(err);
        document.getElementById('info').innerHTML += '<br><span style="color:red">ERROR: ' + err.message + '</span>';
    });
</script>
</body>
</html>
