<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>three-mesh-ui • Hello World + Rotating Cube</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    canvas { display: block; }
  </style>

  <!-- ES module shims for import maps support -->
  <script async src="https://unpkg.com/es-module-shims@1.9.0/dist/es-module-shims.js"></script>

  <!-- Import map: resolve bare imports -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/",
      "three-mesh-ui": "https://unpkg.com/three-mesh-ui@6.5.4/build/three-mesh-ui.module.js"
    }
  }
  </script>
</head>
<body>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import ThreeMeshUI from 'three-mesh-ui';

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x112233);

  const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 1.6, 3.5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Rotating cube
  const geometry = new THREE.BoxGeometry(1, 1, 1);
  const material = new THREE.MeshStandardMaterial({ color: 0x44ff88, metalness: 0.2, roughness: 0.5 });
  const cube = new THREE.Mesh(geometry, material);
  cube.position.y = 1;
  scene.add(cube);

  // Lights
  scene.add(new THREE.HemisphereLight(0xffffff, 0x88aaff, 1.2));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
  dirLight.position.set(5, 8, 4);
  scene.add(dirLight);

  // three-mesh-ui setup
  const fontJSON  = 'https://unpkg.com/three-mesh-ui@6.5.4/examples/assets/Roboto-msdf.json';
  const fontPNG   = 'https://unpkg.com/three-mesh-ui@6.5.4/examples/assets/Roboto-msdf.png';

  const uiContainer = new ThreeMeshUI.Block({
    width: 2.2,
    height: 1.0,
    padding: 0.1,
    borderRadius: 0.15,
    backgroundColor: new THREE.Color(0x000000),
    backgroundOpacity: 0.75,
    fontFamily: fontJSON,
    fontTexture: fontPNG,
    fontSize: 0.085,
    alignContent: 'center',
    justifyContent: 'center',
  });

  uiContainer.position.set(0, 1.6, -2.5);
  uiContainer.rotation.x = -0.25;
  scene.add(uiContainer);

  const helloText = new ThreeMeshUI.Text({
    content: "Hello World",
    fontColor: new THREE.Color(0xffffff),
    fontOpacity: 1,
    textAlign: 'center'
  });

  uiContainer.add(helloText);

  // Animation loop
  const clock = new THREE.Clock();

  function animate() {
    const dt = clock.getDelta();

    cube.rotation.x += 0.4 * dt;
    cube.rotation.y += 0.6 * dt;

    ThreeMeshUI.update();

    controls.update();
    renderer.render(scene, camera);

    requestAnimationFrame(animate);
  }

  animate();

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

</script>
</body>
</html>
